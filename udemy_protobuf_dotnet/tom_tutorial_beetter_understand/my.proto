syntax="proto3";
import "google/protobuf/timestamp.proto";

message BackpackItemRequest {
  string item = 1;
  int32 count = 2;
}

message BackpackItemResponse {
  google.protobuf.Timestamp msg_time = 1;
  string item = 2;
}


message UnpackReqest {
  string item_name = 1;
}

message PackReqest {
  string item_name = 1;
}
message UnpackIdxRequest {
  int32 item_idx = 1;
}
message PackResponse {
  string added = 1;
}

message PackResponseWitId {
  string added = 1;
  int32 id = 2;
}

message UnpackContinouslyResponse {
  string fetched_item = 1;
}

service BackpackManager {
  rpc pack (BackpackItemRequest) returns (BackpackItemResponse);
  rpc unpack (UnpackReqest) returns (BackpackItemResponse);
  rpc unpack_continously (UnpackReqest) returns (stream UnpackContinouslyResponse);
  rpc pack_continously (stream PackReqest) returns (PackResponse);
  rpc pack_and_immediately_show_id(stream PackReqest) returns (stream PackResponseWitId);
  rpc unpack_and_immediately_show(stream UnpackIdxRequest) returns (stream UnpackContinouslyResponse);
}
