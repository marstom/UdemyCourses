syntax = "proto3";

import "google/protobuf/timestamp.proto";

package groom;

message RoomRegistrationRequest  {
    string room_name=1;
    string user_name=2;
}

message RoomRegistrationResponse  {
    bool joined=1;
}


// Chattting
