//    string contents = 2;
//    string user = 3;
//    string room = 4;
//}




service Groom  {
    rpc RegisterToRoom(RoomRegistrationRequest) returns (RoomRegistrationResponse);
//    rpc StartChat (stream ChatMessage) returns (stream ChatMessage); // WEB has not bi-dir streaming
    // this is the limitation of gRPC-Web
}